<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบลงเวลาปฏิบัติงาน โรงเรียนบ้านท่าชะอม</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0066cc">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ลงเวลา">
<link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.13/dist/face-api.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #0066cc; --canvas: #ffffff; --parchment: #f5f5f7;
      --tile-dark: #272729; --tile-dark2: #1d1d1f;
      --ink: #1d1d1f; --muted: #6e6e73; --faint: #aeaeb2;
      --hairline: #d2d2d7; --green: #34c759; --red: #ff3b30;
    }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--parchment); color: var(--ink); min-height: 100vh; }

    /* NAV */
    #gnav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; background: rgba(0,0,0,0.92); backdrop-filter: saturate(180%) blur(20px); height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
    .gnav-brand { display: flex; align-items: center; gap: 10px; }
    .gnav-logo { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; }
    .gnav-title { color: #fff; font-size: 12px; opacity: 0.85; }
    .gnav-btn { background: none; border: 1px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.6); font-size: 11px; padding: 4px 12px; border-radius: 9999px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .gnav-btn:hover { border-color: rgba(255,255,255,0.5); color: #fff; }

    .spinner { width: 32px; height: 32px; border: 3px solid var(--hairline); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    .spinner-sm { width: 20px; height: 20px; border-width: 2px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* HERO */
    .hero { background: var(--tile-dark); padding: 100px 20px 56px; text-align: center; }
    .hero-logo { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; margin: 0 auto 16px; display: block; box-shadow: rgba(0,0,0,0.22) 3px 5px 30px 0; }
    .hero-school { font-size: 20px; font-weight: 600; color: #fff; letter-spacing: -0.374px; }
    .hero-clock { font-size: 48px; font-weight: 600; color: #fff; letter-spacing: -0.28px; margin: 20px 0 0; line-height: 1; }
    .hero-date { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 8px; }

    /* KIOSK GRID */
    .emp-section { background: var(--parchment); padding: 28px 12px 100px; }
    .emp-section-title { text-align: center; font-size: 14px; font-weight: 600; color: var(--muted); margin-bottom: 16px; }
    .emp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px; max-width: 720px; margin: 0 auto;
    }
    @media (max-width: 480px) { .emp-grid { grid-template-columns: repeat(2, 1fr); gap: 7px; } }
    @media (min-width: 481px) and (max-width: 680px) { .emp-grid { grid-template-columns: repeat(3, 1fr); } }

    /* ====== ID CARD — 4:3 landscape, full-bleed photo ====== */
    .id-card {
      position: relative;
      aspect-ratio: 4/3;
      min-width: 0; /* prevent flex/grid blowout */
      border-radius: 10px;
      overflow: hidden;
      cursor: default;
      user-select: none;
      box-shadow: rgba(0,0,0,0.12) 0 2px 8px;
      background: #2a2a2e;
    }
    .id-photo-wrap { position: absolute; inset: 0; }

    /* SCAN FAB */
    .scan-fab {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 300;
      background: var(--primary); color: #fff;
      border: none; border-radius: 9999px;
      padding: 14px 28px;
      font-size: 16px; font-weight: 700; font-family: inherit;
      display: flex; align-items: center; gap: 8px;
      box-shadow: rgba(0,102,204,0.5) 0 8px 28px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }
    .scan-fab:hover { box-shadow: rgba(0,102,204,0.65) 0 10px 34px; transform: translateX(-50%) translateY(-2px); }
    .scan-fab:active { transform: translateX(-50%) scale(0.96); }

    /* Card header — hidden (replaced by top gradient overlay) */
    .id-header { display: none; }

    /* Photo area — fills entire card */
    .id-photo-wrap {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .id-photo { width: 100%; height: 100%; object-fit: cover; }
    .id-photo-placeholder {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; color: #888; width: 100%; height: 100%; background: #2a2a2e;
    }
    .id-photo-placeholder .initial {
      width: 40px; height: 40px; border-radius: 50%;
      background: #3a3a4a; display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; color: #a0aacc;
    }
    .id-photo-placeholder .ph-text { font-size: 9px; color: #666; }

    /* Name overlay — top gradient */
    .id-name-overlay {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 18px 7px 6px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 100%);
      font-size: 10px; font-weight: 700; color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1;
    }
    .id-code-badge {
      font-size: 8px; font-weight: 600; color: rgba(255,255,255,0.65);
      display: block; margin-top: 2px;
    }

    /* Status overlay — bottom gradient */
    .id-status-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 14px 7px 5px;
      background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, transparent 100%);
      display: flex; align-items: center; gap: 4px;
      font-size: 9px; font-weight: 700; color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
    .overlay-in { background: rgba(52,199,89,0.88); color: #fff; }
    .overlay-out { background: rgba(0,0,0,0.45); color: rgba(255,255,255,0.8); }
    .overlay-none { background: rgba(0,0,0,0.25); color: rgba(255,255,255,0.7); }
    .sdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .sdot-green { background: #34c759; box-shadow: 0 0 0 2px rgba(52,199,89,0.35); animation: pulse 1.5s infinite; }
    .sdot-gray { background: rgba(255,255,255,0.5); }
    @keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.4;} }

    /* Card footer — hidden (info now in overlays) */
    .id-footer { display: none; }

    /* Leave button — top-right corner */
    .id-leave-btn {
      position: absolute; top: 5px; right: 5px; z-index: 2;
      background: rgba(0,0,0,0.45); border: none; border-radius: 9999px;
      color: rgba(255,255,255,0.85); font-size: 9px; font-weight: 600; font-family: inherit;
      padding: 3px 7px; cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.12s;
    }
    .id-leave-btn:active { background: rgba(0,0,0,0.7); }

    /* MODAL */
    .overlay { position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.55); backdrop-filter: blur(6px); display: flex; align-items: flex-end; justify-content: center; }
    @media (min-width: 600px) { .overlay { align-items: center; } }
    .modal { background: var(--canvas); border-radius: 24px 24px 0 0; padding: 28px 24px 36px; width: 100%; max-width: 400px; animation: slideUp 0.28s ease; }
    @media (min-width: 600px) { .modal { border-radius: 24px; } }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-handle { width: 36px; height: 4px; background: var(--hairline); border-radius: 9999px; margin: 0 auto 20px; }

    /* Check modal: horizontal layout */
    .check-modal-inner { display: flex; gap: 18px; align-items: flex-start; margin-bottom: 20px; }
    .check-modal-photo {
      width: 80px; height: 107px; border-radius: 10px;
      overflow: hidden; flex-shrink: 0;
      background: #e8eaf0;
      display: flex; align-items: center; justify-content: center;
    }
    .check-modal-photo img { width: 100%; height: 100%; object-fit: cover; }
    .check-modal-photo .cm-initial { font-size: 28px; font-weight: 700; color: #3a4a7a; }
    .check-modal-info { flex: 1; padding-top: 4px; }
    .check-modal-name { font-size: 18px; font-weight: 700; color: var(--ink); line-height: 1.3; margin-bottom: 4px; }
    .check-modal-code { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    .check-modal-status { font-size: 12px; }
    .modal-gps { text-align: center; font-size: 12px; color: var(--muted); min-height: 18px; margin-bottom: 14px; }
    .tag { display: inline-block; padding: 3px 10px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
    .tag-in { background: rgba(52,199,89,0.12); color: #1a7f37; }
    .tag-out { background: rgba(255,59,48,0.1); color: #c00; }
    .btn-in { width: 100%; background: var(--green); color: #fff; border: none; border-radius: 9999px; padding: 15px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; box-shadow: rgba(0,0,0,0.18) 0 4px 20px; transition: opacity 0.15s, transform 0.1s; margin-bottom: 10px; }
    .btn-out { width: 100%; background: var(--red); color: #fff; border: none; border-radius: 9999px; padding: 15px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; box-shadow: rgba(0,0,0,0.18) 0 4px 20px; transition: opacity 0.15s, transform 0.1s; margin-bottom: 10px; }
    .btn-in:active, .btn-out:active { transform: scale(0.95); }
    .btn-cancel { width: 100%; background: var(--parchment); color: var(--muted); border: none; border-radius: 9999px; padding: 13px; font-size: 14px; cursor: pointer; font-family: inherit; }

    /* ADMIN */
    .admin-hero { background: var(--tile-dark2); padding: 48px 20px 56px; text-align: center; }
    .admin-hero h1 { font-size: 32px; font-weight: 600; color: #fff; letter-spacing: -0.374px; }
    .admin-hero p { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 6px; }
    .sub-nav { position: sticky; top: 44px; z-index: 100; background: rgba(245,245,247,0.88); backdrop-filter: saturate(180%) blur(20px); border-bottom: 1px solid rgba(0,0,0,0.08); display: flex; gap: 4px; padding: 0 16px; height: 52px; align-items: center; overflow-x: auto; }
    .sub-nav::-webkit-scrollbar { display: none; }
    .tab { background: transparent; border: none; padding: 7px 14px; border-radius: 9999px; font-size: 13px; color: var(--muted); cursor: pointer; font-family: inherit; white-space: nowrap; transition: all 0.15s; }
    .tab.active { background: var(--primary); color: #fff; font-weight: 600; }
    .tab:hover:not(.active) { background: rgba(0,0,0,0.06); }
    .admin-body { max-width: 900px; margin: 0 auto; padding: 36px 20px 80px; }
    .card { background: var(--canvas); border: 1px solid var(--hairline); border-radius: 18px; padding: 22px; margin-bottom: 18px; }
    .card-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
    .sec-head { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
    .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
    .tbl th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 600; color: var(--faint); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--hairline); }
    .tbl td { padding: 12px 14px; border-bottom: 1px solid rgba(0,0,0,0.04); vertical-align: middle; }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tr:hover td { background: var(--parchment); }
    .fg { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 560px) { .fg { grid-template-columns: 1fr; } }
    .ff label { display: block; font-size: 11px; font-weight: 600; color: var(--faint); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .ff input, .ff select { width: 100%; border: 1px solid var(--hairline); background: var(--canvas); color: var(--ink); border-radius: 11px; padding: 10px 14px; font-size: 14px; outline: none; font-family: inherit; }
    .ff input:focus { border-color: #0071e3; box-shadow: 0 0 0 2px rgba(0,113,227,0.12); }
    .btn-blue { background: var(--primary); color: #fff; border: none; border-radius: 9999px; padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity 0.15s, transform 0.1s; }
    .btn-blue:hover { opacity: 0.88; }
    .btn-blue:active { transform: scale(0.95); }
    .btn-ghost { background: transparent; color: var(--red); border: none; border-radius: 8px; padding: 6px 10px; font-size: 12px; cursor: pointer; font-family: inherit; }
    .btn-ghost:hover { background: rgba(255,59,48,0.08); }
    .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); border-radius: 9999px; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
    .btn-outline:hover { background: rgba(0,102,204,0.06); }
    .btn-gps { display: flex; align-items: center; gap: 6px; background: rgba(0,102,204,0.08); color: var(--primary); border: 1px solid rgba(0,102,204,0.2); border-radius: 9999px; padding: 9px 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn-gps:hover { background: rgba(0,102,204,0.14); }
    .sel { border: 1px solid var(--hairline); background: var(--canvas); color: var(--ink); border-radius: 9999px; padding: 7px 14px; font-size: 13px; font-family: inherit; outline: none; }
    .modal-input { width: 100%; border: 1px solid var(--hairline); background: var(--canvas); color: var(--ink); border-radius: 9999px; padding: 12px 20px; font-size: 15px; outline: none; font-family: inherit; margin-bottom: 12px; }
    .modal-input:focus { border-color: #0071e3; box-shadow: 0 0 0 2px rgba(0,113,227,0.15); }
    .modal-err { color: #c00; font-size: 13px; text-align: center; margin-bottom: 10px; min-height: 18px; }

    /* Employee row in admin */
    .emp-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.04); gap: 12px; }
    .emp-row:last-child { border-bottom: none; }
    .emp-thumb { width: 44px; height: 58px; border-radius: 8px; object-fit: cover; background: #e8eaf0; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #3a4a7a; font-size: 16px; overflow: hidden; }
    .emp-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .emp-row-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    /* Photo upload */
    .photo-upload-area {
      border: 2px dashed var(--hairline); border-radius: 12px;
      padding: 20px; text-align: center; cursor: pointer;
      transition: border-color 0.15s; margin-bottom: 12px;
    }
    .photo-upload-area:hover { border-color: var(--primary); }
    .photo-preview { width: 100px; height: 133px; object-fit: cover; border-radius: 10px; margin: 8px auto; display: block; }

    /* LEAVE */
    .tag-leave { background: rgba(255,159,10,0.13); color: #b35c00; }
    .tag-pending { background: rgba(100,100,100,0.1); color: #555; }
    .tag-approved { background: rgba(52,199,89,0.12); color: #1a7f37; }
    .tag-rejected { background: rgba(255,59,48,0.1); color: #c00; }
    .overlay-leave { background: rgba(255,159,10,0.85); color: #fff; }
    .leave-form-scroll { max-height: 75vh; overflow-y: auto; padding-right: 2px; }
    .leave-type-pill { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,159,10,0.1); border: 1px solid rgba(255,159,10,0.3); border-radius: 9999px; padding: 4px 12px; font-size: 12px; font-weight: 600; color: #b35c00; margin-bottom: 12px; }
    .leave-info-box { background: rgba(0,102,204,0.06); border: 1px solid rgba(0,102,204,0.15); border-radius: 12px; padding: 12px 14px; font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.6; }
    .leave-btn-row { display: flex; gap: 8px; }
    .leave-btn-row .btn-in, .leave-btn-row .btn-out { flex: 1; }
    .btn-orange { width: 100%; background: #ff9500; color: #fff; border: none; border-radius: 9999px; padding: 15px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; box-shadow: rgba(0,0,0,0.18) 0 4px 20px; transition: opacity 0.15s, transform 0.1s; margin-bottom: 10px; }
    .btn-orange:active { transform: scale(0.95); }
    .btn-orange:disabled { opacity: 0.5; }
    .ff textarea { width: 100%; border: 1px solid var(--hairline); background: var(--canvas); color: var(--ink); border-radius: 11px; padding: 10px 14px; font-size: 14px; outline: none; font-family: inherit; resize: vertical; min-height: 72px; }
    .ff textarea:focus { border-color: #0071e3; box-shadow: 0 0 0 2px rgba(0,113,227,0.12); }
    .leave-days-badge { display: inline-block; background: var(--primary); color: #fff; border-radius: 9999px; padding: 3px 12px; font-size: 13px; font-weight: 700; margin-left: 8px; }

    /* Monthly */
    .m-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 16px; }
    .m-card { background: var(--canvas); border: 1px solid var(--hairline); border-radius: 18px; padding: 20px; }
    .m-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
    .m-stat { background: var(--parchment); border-radius: 11px; padding: 12px; text-align: center; }
    .m-num { font-size: 26px; font-weight: 600; letter-spacing: -0.28px; }
    .m-lbl { font-size: 10px; color: var(--faint); margin-top: 2px; }

    .toast { position: fixed; top: 56px; left: 50%; transform: translateX(-50%); z-index: 999; padding: 10px 20px; border-radius: 9999px; font-size: 13px; font-weight: 600; color: #fff; box-shadow: rgba(0,0,0,0.22) 3px 5px 30px 0; animation: toastIn 0.22s ease; white-space: nowrap; }
    .t-ok { background: #1a7f37; } .t-err { background: #c00; }
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-8px);}to{opacity:1;transform:translateX(-50%) translateY(0);} }
    .empty { text-align: center; padding: 40px; color: var(--faint); font-size: 14px; }
  </style>
</head>
<body>

function fTime(ts){return new Date(ts).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function gdist(la1,lo1,la2,lo2){const R=6371000,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180;const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function toast(msg,type='ok'){document.querySelectorAll('.toast').forEach(t=>t.remove());const t=document.createElement('div');t.className=`toast t-${type}`;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
function closeModal(){stopFaceScan();document.querySelectorAll('.overlay').forEach(m=>m.remove());}
function esc(s){return String(s||'').replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];});}
const ADMIN_PW_KEY='thatime_admin_hash';
async function hashPw(pw){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}
function getH(){return localStorage.getItem(ADMIN_PW_KEY)||'';}

}

async function loadEmpGrid(){
  const {data:emps}=await sb.from('employees').select('*').order('name');
  empsCache=emps||[];
  const today=new Date();today.setHours(0,0,0,0);
  const {data:att}=await sb.from('attendance').select('*').gte('timestamp',today.toISOString()).order('timestamp',{ascending:false});
  const lastByEmp={};
  (att||[]).forEach(r=>{if(!lastByEmp[r.employee_id])lastByEmp[r.employee_id]=r;});
  window._lastByEmp=lastByEmp;
  const todayStr=today.toISOString().slice(0,10);
  const {data:leavesToday}=await sb.from('leaves').select('*').eq('status','approved').lte('start_date',todayStr).gte('end_date',todayStr);
  const onLeave=new Set((leavesToday||[]).map(l=>l.employee_id));
  const leaveTypeToday={};(leavesToday||[]).forEach(l=>{leaveTypeToday[l.employee_id]=l.leave_type;});
  const grid=document.getElementById('empGrid');
  if(!grid) return;
  if(!emps||emps.length===0){grid.innerHTML='<p class="empty">ยังไม่มีพนักงาน — Admin เพิ่มพนักงานก่อน</p>';return;}
  grid.className='emp-grid';
  grid.removeAttribute('style'); // clear inline display:flex ที่ override display:grid
  grid.innerHTML=emps.map(e=>{
    const last=lastByEmp[e.id];
    const isIn=last&&last.type==='in';
    const onL=onLeave.has(e.id);
    const statusDot=onL?`<span class="sdot" style="background:#ff9500;animation:none;"></span>`:isIn?`<span class="sdot sdot-green"></span>`:`<span class="sdot sdot-gray"></span>`;
    const statusTxt=onL?(leaveTypeToday[e.id]||'ลา'):isIn?'IN '+fTime(last.timestamp):last?'OUT '+fTime(last.timestamp):'ยังไม่เช็ค';
    return `<div class="id-card">
      <div class="id-photo-wrap">
        ${e.photo
          ? `<img class="id-photo" src="${e.photo}" alt="${esc(e.name)}">`
          : `<div class="id-photo-placeholder"><div class="initial">${e.name.slice(0,1)}</div><div class="ph-text">ไม่มีรูป</div></div>`
        }
      </div>
      <div class="id-name-overlay">${esc(e.name)}<span class="id-code-badge">${esc(e.username)}</span></div>
      <div class="id-status-overlay">${statusDot}${statusTxt}</div>
      <button class="id-leave-btn" onclick="openLeaveModal('${e.id}')">📋 ลา</button>
    </div>`;
  }).join('');
}

function openScanModal(){

  overlay.innerHTML=`<div class="modal">
    <div class="modal-handle"></div>
    <p style="text-align:center;font-size:17px;font-weight:700;color:var(--ink);margin-bottom:6px;">🔍 สแกนหน้าเพื่อเช็คเวลา</p>

    <div id="actionArea"><div style="display:flex;justify-content:center;"><div class="spinner spinner-sm"></div></div></div>
    <button class="btn-cancel" style="margin-top:10px;" onclick="stopFaceScan();closeModal()">ยกเลิก</button>
  </div>`;
  document.body.appendChild(overlay);
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude:lat,longitude:lng}=pos.coords;
    const d=gdist(lat,lng,settingsCache.office_lat,settingsCache.office_lng);
    window._gps={lat,lng,d};
    const gpsEl=document.getElementById('gpsStatus');
    const aEl=document.getElementById('actionArea');
    if(!aEl)return;
    if(d<=settingsCache.radius){
      if(gpsEl)gpsEl.textContent=`✅ อยู่ในรัศมี · ห่าง ${Math.round(d)} ม.`;
      aEl.innerHTML=`<button class="btn-in" onclick="startFaceScan()">🔍 เริ่มสแกนใบหน้า</button>`;
    }else{
      if(gpsEl)gpsEl.textContent=`⚠️ ห่างออฟฟิศ ${Math.round(d)} ม. (เกิน ${settingsCache.radius} ม.)`;
      aEl.innerHTML=`<p style="text-align:center;color:var(--red);font-size:13px;font-weight:600;padding:8px 0;">❌ กรุณาเดินเข้าใกล้ออฟฟิศก่อน</p>`;
    }
  },()=>{
    const gpsEl=document.getElementById('gpsStatus');
    const aEl=document.getElementById('actionArea');
    if(gpsEl)gpsEl.textContent='⚠️ ไม่สามารถดึง GPS ได้';
    if(aEl)aEl.innerHTML=`<p style="text-align:center;color:var(--red);font-size:13px;padding:8px 0;">❌ กรุณาเปิด GPS แล้วลองใหม่</p>`;
  },{enableHighAccuracy:true,timeout:8000});
}

async function doCheck(empId,type){
  const btn=document.getElementById('actionBtn');
  if(btn){btn.disabled=true;btn.textContent='กำลังดึง GPS…';}
  navigator.geolocation.getCurrentPosition(async pos=>{
    const {latitude:lat,longitude:lng}=pos.coords;
    const d=gdist(lat,lng,settingsCache.office_lat,settingsCache.office_lng);
    if(d>settingsCache.radius){toast(`❌ ห่างออฟฟิศ ${Math.round(d)} ม.`,'err');if(btn){btn.disabled=false;btn.textContent=type==='in'?'🟢 เช็คอิน':'🔴 เช็คเอาท์';}return;}
    const emp=empsCache.find(e=>e.id===empId);
    const {error}=await sb.from('attendance').insert({employee_id:empId,type,timestamp:new Date().toISOString(),lat,lng,distance:Math.round(d)});
    if(error){toast('❌ บันทึกไม่สำเร็จ','err');if(btn){btn.disabled=false;btn.textContent=type==='in'?'🟢 เช็คอิน':'🔴 เช็คเอาท์';}return;}
    closeModal();
    toast(type==='in'?`✅ ${emp.name} เช็คอินแล้ว!`:`✅ ${emp.name} เช็คเอาท์แล้ว!`);
    await loadEmpGrid();
  },()=>{toast('❌ ไม่สามารถดึง GPS ได้','err');if(btn){btn.disabled=false;btn.textContent=type==='in'?'🟢 เช็คอิน':'🔴 เช็คเอาท์';}},{enableHighAccuracy:true,timeout:10000});
}

async function doAdminLogin(){
  const pass=document.getElementById('adminPass')?.value||'';
  const errEl=document.getElementById('adminErr');
  if(!pass){if(errEl)errEl.textContent='กรุณาระบุรหัสผ่าน';return;}
  const h=await hashPw(pass);
  // Supabase คือ source of truth เสมอ
  // admin_set_hash(new=h, old=h): NULL→ตั้งใหม่ได้; stored=h→ผ่าน; stored≠h→false
  const {data:ok,error}=await sb.rpc('admin_set_hash',{p_new_hash:h,p_old_hash:h});
  if(error||!ok){if(errEl)errEl.textContent='รหัสผ่านไม่ถูกต้อง';return;}
  localStorage.setItem(ADMIN_PW_KEY,h); // อัปเดต local cache ให้ตรงกับ Supabase
  adminUser={name:'ผู้ดูแลระบบ'};closeModal();renderAdmin();
}

async function loadMonthly(){
  const {data:emps}=await sb.from('employees').select('*').order('name');
  const [yr,mo]=activeMonth.split('-').map(Number);
  const months=[];
  for(let m=0;m<12;m++){const d=new Date(yr,m,1);months.push({v:`${yr}-${String(m+1).padStart(2,'0')}`,l:d.toLocaleDateString('th-TH',{month:'long',year:'numeric'})});}
  const lastDay=new Date(yr,mo,0).getDate();
  const firstDayStr=`${yr}-${String(mo).padStart(2,'0')}-01`;
  const lastDayStr=`${yr}-${String(mo).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
  const startDt=new Date(yr,mo-1,1);
  const endDt=new Date(yr,mo,1);
  // helper: local date string from Date object
  const localDateStr=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  // helper: parse date string to local Date
  const parseDate=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);};
  const [attRes,leaveRes]=await Promise.all([
    sb.from('attendance').select('*').gte('timestamp',startDt.toISOString()).lt('timestamp',endDt.toISOString()),
    sb.from('leaves').select('*').eq('status','approved').lte('start_date',lastDayStr).gte('end_date',firstDayStr)
  ]);
  const recs=attRes.data||[];
  const leaves=leaveRes.data||[];
  // count working days in month (Mon-Fri, minus holidays, plus extra workdays)
  const holidays=new Set(settingsCache.holidays||[]);
  const extras=new Set(settingsCache.extra_workdays||[]);
  let workDays=0;
  for(let d=new Date(startDt);d<endDt;d.setDate(d.getDate()+1)){
    const ds=localDateStr(d);
    const dw=d.getDay();
    const isWeekday=dw>=1&&dw<=5;
    if((isWeekday&&!holidays.has(ds))||extras.has(ds))workDays++;
  }
  const sum=(emps||[]).map(u=>{
    const ur=recs.filter(r=>r.employee_id===u.id);
    const byDay={};ur.forEach(r=>{
      const bkk=new Date(new Date(r.timestamp).getTime()+7*3600000);
      const dk=localDateStr(bkk);
      if(!byDay[dk])byDay[dk]={in:false,out:false};
      if(r.type==='in')byDay[dk].in=true;
      if(r.type==='out')byDay[dk].out=true;
    });
    const presentDays=Object.keys(byDay).length;

let newPhotoData=null;
function previewPhoto(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    newPhotoData=e.target.result;
    const prev=document.getElementById('photoPreview');
    const ph=document.getElementById('photoPlaceholder');
    if(prev){prev.src=newPhotoData;prev.style.display='block';}
    if(ph)ph.style.display='none';
  };
  reader.readAsDataURL(file);
}

async function uploadPhoto(input,empId){
  const file=input.files[0];if(!file)return;
  // Compress image before saving
  const reader=new FileReader();
  reader.onload=async e=>{
    const img=new Image();
    img.onload=async()=>{
      const canvas=document.createElement('canvas');
      const MAX=600;
      let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=h*(MAX/w);w=MAX;}}else{if(h>MAX){w=w*(MAX/h);h=MAX;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL('image/jpeg',0.82);
      toast('⏳ กำลังวิเคราะห์ใบหน้า…');
      try{ await loadFaceModels(); }catch(e){ toast('❌ โหลด AI ไม่สำเร็จ ตรวจสอบอินเทอร์เน็ต','err'); return; }
      const descriptor=await extractDescriptor(img);
      const {data:ok,error}=await sb.rpc('admin_update_employee_photo',{p_hash:getH(),p_id:empId,p_photo:compressed,p_face_descriptor:descriptor||null});
      if(error||!ok){toast('❌ '+(error?.message||'ไม่ผ่านการตรวจสอบ').slice(0,60),'err');return;}
      toast(descriptor?'✅ อัปโหลดรูปและบันทึกใบหน้าสำเร็จ!':'✅ อัปโหลดรูปแล้ว (ไม่พบใบหน้า ลองรูปอื่น)');
      await loadEmployeesAdmin();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

async function addFacePhoto(input,empId){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    const img=new Image();
    img.onload=async()=>{
      toast('⏳ กำลังวิเคราะห์ใบหน้า…');
      try{await loadFaceModels();}catch(e){toast('❌ โหลด AI ไม่สำเร็จ','err');return;}
      const descriptor=await extractDescriptor(img);
      if(!descriptor){toast('❌ ไม่พบใบหน้าในรูปนี้ — ลองรูปอื่น','err');return;}
      const{data:ok,error}=await sb.rpc('admin_add_face_descriptor',{p_hash:getH(),p_id:empId,p_descriptor:descriptor});
      if(error||!ok){toast('❌ '+(error?.message||'ไม่สำเร็จ').slice(0,60),'err');return;}
      toast('✅ เพิ่มรูปใบหน้าแล้ว!');
      await loadEmployeesAdmin();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

async function addEmp(){
  const name=document.getElementById('nName')?.value.trim();
  const user=document.getElementById('nUser')?.value.trim();
  const err=document.getElementById('addErr');
  if(!name||!user){if(err)err.textContent='กรุณากรอกข้อมูลให้ครบ';return;}
  const payload={name,username:user};
  if(newPhotoData){
    const img=new Image();
    await new Promise(resolve=>{img.onload=resolve;img.src=newPhotoData;});
    const canvas=document.createElement('canvas');
    const MAX=600;let w=img.width,h=img.height;
    if(w>h){if(w>MAX){h=h*(MAX/w);w=MAX;}}else{if(h>MAX){w=w*(MAX/h);h=MAX;}}
    canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);
    payload.photo=canvas.toDataURL('image/jpeg',0.82);
    try{ await loadFaceModels(); }catch(e){ if(err)err.textContent='โหลด AI ไม่สำเร็จ ตรวจสอบอินเทอร์เน็ต'; return; }
    const desc=await extractDescriptor(img);
    if(desc)payload.face_descriptor=desc;
  }
  const {data:result,error}=await sb.rpc('admin_add_employee',{p_hash:getH(),p_name:name,p_username:user,p_photo:payload.photo||null,p_face_descriptor:payload.face_descriptor||null});
  if(error||(result&&result.error)){if(err)err.textContent=result?.error==='unique'?'Username นี้มีอยู่แล้ว':(error?.message||result?.error||'ไม่สำเร็จ').slice(0,80);return;}
  toast('✅ เพิ่มพนักงานสำเร็จ!');newPhotoData=null;
  await loadEmployeesAdmin();
}

async function delEmp(id){

}

  return arr.slice().sort().map(d=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--hairline);">

function addExtraWorkday(){

function removeDay(d,type){

    settingsCache.holidays=(settingsCache.holidays||[]).filter(x=>x!==d);
    document.getElementById('holidayList').innerHTML=renderHolidayList(settingsCache.holidays,'holiday');
  }else{
    settingsCache.extra_workdays=(settingsCache.extra_workdays||[]).filter(x=>x!==d);
    document.getElementById('extraList').innerHTML=renderHolidayList(settingsCache.extra_workdays,'extra');
  }
}

function captureGPS(){
  const res=document.getElementById('gpsRes');if(res)res.textContent='⏳ กำลังดึงตำแหน่ง…';
  navigator.geolocation.getCurrentPosition(pos=>{

function updateLeaveInfo(){
  const sel = document.getElementById('lvType');
  const box = document.getElementById('leaveInfoBox');
  if(!sel||!box) return;
  const t = LEAVE_TYPES.find(x=>x.v===sel.value);
  if(!t) return;
  let txt = '';
  if(t.max) txt += `สิทธิ: <b>ไม่เกิน ${t.max} ${t.unit}</b>`;
  if(t.note) txt += (txt?' · ':'')+t.note;
  box.innerHTML = txt || '';
  box.style.display = txt ? '' : 'none';

function calcLeaveDays(){
  const s = document.getElementById('lvStart')?.value;
  const e = document.getElementById('lvEnd')?.value;
  const d = document.getElementById('lvDaysDisplay');
  if(!s||!e||!d) return;
  const diff = Math.round((new Date(e)-new Date(s))/(1000*60*60*24))+1;
  d.textContent = diff>0 ? diff+' วัน' : '—';
  // enforce end >= start
  if(e<s){ document.getElementById('lvEnd').value=s; d.textContent='1 วัน'; }
}

async function submitLeave(empId){
  const type    = document.getElementById('lvType')?.value;
  const start   = document.getElementById('lvStart')?.value;
  const end     = document.getElementById('lvEnd')?.value;
  const reason  = document.getElementById('lvReason')?.value.trim();
  const contact = document.getElementById('lvContact')?.value.trim();
  const errEl   = document.getElementById('lvErr');
  if(!type||!start||!end){if(errEl)errEl.textContent='กรุณากรอกข้อมูลให้ครบ';return;}
  if(!reason){if(errEl)errEl.textContent='กรุณาระบุเหตุผลการลา';return;}
  if(end<start){if(errEl)errEl.textContent='วันที่สิ้นสุดต้องไม่ก่อนวันที่เริ่มลา';return;}
  const days = Math.round((new Date(end)-new Date(start))/(1000*60*60*24))+1;
  const btn = document.querySelector('.btn-orange');
  if(btn){btn.disabled=true;btn.textContent='กำลังบันทึก…';}
  const {error} = await sb.from('leaves').insert({employee_id:empId, leave_type:type, start_date:start, end_date:end, days, reason, contact:contact||null, status:'pending'});
  if(error){
    if(errEl)errEl.textContent='❌ '+error.message.slice(0,80);
    if(btn){btn.disabled=false;btn.textContent='📤 ยื่นใบลา';}
    return;
  }
  document.querySelector('.overlay')?.remove();
  toast('✅ ยื่นใบลาสำเร็จ! รอการอนุมัติจาก Admin');
}

function csvDownload(rows, filename){
  // rows = array of objects, all same keys
  if(!rows||!rows.length){toast('❌ ไม่มีข้อมูล','err');return;}
  const cols=Object.keys(rows[0]);
  const escape=v=>{const s=String(v??'');return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;};
  const csv=[cols.map(escape).join(','),...rows.map(r=>cols.map(k=>escape(r[k])).join(','))].join('\r\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.style.display='none';
  a.href=url;
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
}

// ===== FACE RECOGNITION HELPERS =====
const FACE_MODEL_URL='https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.13/model';

// onProgress(msg) — optional callback แสดงสถานะระหว่างโหลด (~30MB)
async function loadFaceModels(onProgress){
  if(window._faceApiReady) return;
  const upd = onProgress || function(){};
  upd('⏳ โหลด AI (1/3) — ตรวจจับใบหน้า…');
  await faceapi.nets.tinyFaceDetector.loadFromUri(FACE_MODEL_URL);
  upd('⏳ โหลด AI (2/3) — จุดสังเกตใบหน้า…');
  await faceapi.nets.faceLandmark68TinyNet.loadFromUri(FACE_MODEL_URL);
  upd('⏳ โหลด AI (3/3) — จดจำใบหน้า…');
  await faceapi.nets.faceRecognitionNet.loadFromUri(FACE_MODEL_URL);
  window._faceApiReady = true;
}

async function extractDescriptor(imgEl){
  try{
    const det=await faceapi.detectSingleFace(imgEl,new faceapi.TinyFaceDetectorOptions({inputSize:224,scoreThreshold:0.4}))
      .withFaceLandmarks(true).withFaceDescriptor();
    return det?Array.from(det.descriptor):null;
  }catch(e){return null;}
}

// ===== FACE SCAN =====
let faceStream=null,faceTimer=null;

async function startFaceScan(){
  const aEl=document.getElementById('actionArea');
  if(!aEl)return;
  // สร้าง allDescs — รองรับ multi-photo (face_descriptors) และ single fallback (face_descriptor)
  const allDescs=empsCache
    .filter(e=>(e.face_descriptors?.length>0)||(e.face_descriptor?.length>0))
    .map(e=>({
      id:e.id,name:e.name,
      descs:e.face_descriptors?.length>0
        ?e.face_descriptors.map(d=>new Float32Array(d))
        :[new Float32Array(e.face_descriptor)]
    }));
  if(!allDescs.length){
    aEl.innerHTML=`<p style="text-align:center;color:var(--red);font-size:13px;padding:10px 0;">❌ ยังไม่มีข้อมูลใบหน้าของพนักงานคนใด<br>กรุณาให้ Admin อัปโหลดรูปก่อน</p><button class="btn-cancel" style="margin-top:10px;" onclick="closeModal()">ปิด</button>`;
    return;
  }
  aEl.innerHTML=`<div style="position:relative;border-radius:14px;overflow:hidden;background:#000;width:160px;aspect-ratio:3/4;margin:0 auto 10px;">
    <video id="faceVid" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover;transform:scaleX(-1);"></video>
    <div id="faceCD" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:80px;font-weight:700;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,0.6);opacity:0;pointer-events:none;transition:opacity 0.2s;"></div>
  </div>
  <p id="faceTxt" style="text-align:center;font-size:12px;color:var(--muted);margin-bottom:10px;">👤 หันหน้าเข้ากล้อง…</p>
  <button class="btn-cancel" onclick="stopFaceScan();closeModal()">ยกเลิก</button>`;
  try{
    faceStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:320},height:{ideal:426}},audio:false});
    const vid=document.getElementById('faceVid');
    vid.srcObject=faceStream;await vid.play();
  }catch(e){
    aEl.innerHTML=`<p style="color:var(--red);text-align:center;font-size:13px;padding:10px 0;">❌ ไม่สามารถเปิดกล้องได้</p><button class="btn-cancel" style="margin-top:10px;" onclick="closeModal()">ปิด</button>`;return;
  }
  const faceTxt=document.getElementById('faceTxt');
  if(!window._faceApiReady){
    try{
      await loadFaceModels(function(msg){ if(faceTxt) faceTxt.textContent=msg; });
    }catch(e){
      aEl.innerHTML=`<p style="color:var(--red);text-align:center;font-size:13px;padding:10px 0;">❌ โหลด AI ไม่สำเร็จ กรุณาตรวจสอบอินเทอร์เน็ต</p><button class="btn-cancel" style="margin-top:10px;" onclick="stopFaceScan();closeModal()">ปิด</button>`;return;
    }
  }
  if(faceTxt)faceTxt.textContent='👤 หันหน้าเข้ากล้อง…';
  const FACE_THRESH=0.48;   // Euclidean distance threshold (0.45→0.48: match ง่ายขึ้น, ratio test ยังคุมอยู่)
  const RATIO_THRESH=0.85;  // best/second ratio — ยิ่งต่ำยิ่ง unambiguous
  const MATCH_NEEDED=2;     // consecutive matching frames ก่อน countdown (3→2: เร็วขึ้น ~0.6วิ)
  let counting=false,cdIv=null,matchStreak=0,lockedId=null,mismatchCount=0;
  faceTimer=setInterval(async()=>{
    const vid=document.getElementById('faceVid');
    const cdEl=document.getElementById('faceCD');
    const txtEl=document.getElementById('faceTxt');
    if(!vid||!cdEl){clearInterval(faceTimer);return;}
    let det=null;
    try{
      det=await faceapi.detectSingleFace(vid,new faceapi.TinyFaceDetectorOptions({scoreThreshold:0.4}))
        .withFaceLandmarks(true).withFaceDescriptor();
    }catch(e){}
    if(det){
      // 1:N — หาพนักงานที่ใกล้ที่สุด (min dist จากทุก descriptor ของคนนั้น)
      let bestDist=Infinity,bestEmp=null,secondDist=Infinity;
      for(const e of allDescs){
        let minD=Infinity;
        for(const desc of e.descs){const d=faceapi.euclideanDistance(det.descriptor,desc);if(d<minD)minD=d;}
        if(minD<bestDist){secondDist=bestDist;bestDist=minD;bestEmp=e;}
        else if(minD<secondDist){secondDist=minD;}
      }
      // ratio test: ถ้า best ใกล้กับ second มากเกินไป = ambiguous
      const ratio=allDescs.length>1?bestDist/secondDist:0;
      const matched=bestDist<FACE_THRESH&&(allDescs.length===1||ratio<RATIO_THRESH);
      if(!matched){
        matchStreak=0;mismatchCount++;
        if(counting){
          // swap-face attack หรือหน้าเปลี่ยนระหว่าง countdown → ยกเลิก
          counting=false;clearInterval(cdIv);cdIv=null;lockedId=null;
          if(cdEl)cdEl.style.opacity=0;
        }
        if(txtEl)txtEl.textContent=`❌ ไม่พบใบหน้าตรงกัน (${mismatchCount} ครั้ง) — กรุณาลองใหม่`;
        return;
      }
      // ตรวจ swap-face attack: ถ้า lockedId ล็อคไว้แล้ว แต่เจอคนอื่น → ยกเลิก
      if(lockedId&&lockedId!==bestEmp.id){
        matchStreak=0;mismatchCount++;
        if(counting){
          counting=false;clearInterval(cdIv);cdIv=null;lockedId=null;
          if(cdEl)cdEl.style.opacity=0;
        }
        if(txtEl)txtEl.textContent=`🚫 ตรวจพบการสลับใบหน้า — กรุณาลองใหม่`;
        return;
      }
      lockedId=bestEmp.id;matchStreak++;mismatchCount=0;
      if(matchStreak<MATCH_NEEDED){
        if(txtEl)txtEl.textContent=`✅ พบ ${bestEmp.name} — กำลังยืนยัน… (${matchStreak}/${MATCH_NEEDED})`;
        return;
      }
      // ผ่าน MATCH_NEEDED frames ติดต่อกัน → เริ่ม countdown
      if(!counting){
        counting=true;let cd=1; // 3→1: GPS pre-fetched แล้วใน window._gps ไม่ต้องรอ
        if(txtEl)txtEl.textContent=`✅ ยืนยัน ${bestEmp.name} แล้ว กำลังบันทึก…`;
        cdEl.style.opacity=1;cdEl.textContent=cd;
        const confirmedId=lockedId; // snapshot id ก่อน countdown
        cdIv=setInterval(()=>{
          cd--;
          const el=document.getElementById('faceCD');
          if(!el){clearInterval(cdIv);return;}
          if(cd>0){el.textContent=cd;}else{
            clearInterval(cdIv);clearInterval(faceTimer);faceTimer=null;
            stopFaceScan();
            // auto-determine check-in/out type จาก attendance ล่าสุด
            const lastRec=window._lastByEmp?.[confirmedId];
            const checkType=(lastRec&&lastRec.type==='in')?'out':'in';
            const g=window._gps||{};
            _doCheckGPS(confirmedId,checkType,g.lat,g.lng,g.d);
          }
        },1000);
      }
    }else{
      // ไม่พบใบหน้า — reset streak แต่ไม่ยกเลิก countdown
      matchStreak=0;
      if(!counting&&txtEl)txtEl.textContent='👤 หันหน้าเข้ากล้อง…';
    }
  },400); // 600→400ms: scan loop เร็วขึ้น
}

function stopFaceScan(){
  if(faceTimer){clearInterval(faceTimer);faceTimer=null;}
  if(faceStream){faceStream.getTracks().forEach(t=>t.stop());faceStream=null;}
}

async function _doCheckGPS(empId,type,lat,lng,dist){
  const emp=empsCache.find(e=>e.id===empId);
  if(!emp)return;
  const {error}=await sb.from('attendance').insert({employee_id:empId,type,timestamp:new Date().toISOString(),lat:lat||null,lng:lng||null,distance:dist?Math.round(dist):null});
  if(error){toast('❌ '+error.message.slice(0,60),'err');return;}
  closeModal();
  toast(type==='in'?`✅ ${emp.name} เช็คอินแล้ว!`:`✅ ${emp.name} เช็คเอาท์แล้ว!`);
  await loadEmpGrid();
}


async function exportHistory(){
  toast('⏳ กำลัง Export…');
  let q=sb.from('attendance').select('*, employees(name,username)').order('timestamp',{ascending:false});
  if(filterEmp!=='all')q=q.eq('employee_id',filterEmp);
  const {data:recs,error}=await q;
  if(error||!recs||recs.length===0){toast('❌ ไม่มีข้อมูล','err');return;}
  const rows=recs.map(r=>{
    const d=new Date(r.timestamp);
    return{
      'ชื่อพนักงาน':r.employees?.name||'-',
      'รหัสพนักงาน':r.employees?.username||'-',
      'ประเภท':r.type==='in'?'เช็คอิน':'เช็คเอาท์',
      'วันที่':d.toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'}),
      'เวลา':d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
      'ระยะห่าง(ม.)':r.distance??''
    };
  });
  csvDownload(rows,'attendance_'+new Date().toISOString().slice(0,10)+'.csv');
  toast('✅ Download แล้ว!');
}


boot();
